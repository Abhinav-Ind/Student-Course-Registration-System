<!DOCTYPE html>
<html>

<head>
    <title>Update Professor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="navbar">
        <a href="/">Home</a>
        <a href="/departments">Departments</a>
        <a href="/students">Students</a>
        <a href="/professors">Professors</a>
        <a href="/subjects">Subjects</a>
        <a href="/enrollments">Enrollments</a>
    </div>

    <h1>Update Professor</h1>

    <form action="/find_professor" method="POST">

        <label>Professor ID:</label>
        <input type="text" name="prof_id" required>

        <input type="submit" value="Search">

    </form>

    {% if professor %}

    <hr>

    <form action="/update_professor_data" method="POST">

        <input type="hidden" name="prof_id" value="{{ professor[0] }}">

        <p><b>Professor ID:</b> {{ professor[0] }}</p>

        <label>Name:</label>
        <input type="text" name="prof_name" value="{{ professor[1] }}">

        <br><br>

        <label>Designation:</label>
        <input type="text" name="designation" value="{{ professor[2] }}">

        <br><br>

        <label>Phone:</label>
        <input type="text" name="phone" value="{{ professor[3] }}">

        <br><br>

        <label>Email:</label>
        <input type="email" name="email" value="{{ professor[4] }}">

        <br><br>

        <input type="submit" value="Update Professor">

    </form>

    {% endif %}

    <footer>
        <hr>
        <p>
            Student Course Registration System |
            DBMS Mini Project |
            BIT Bangalore
        </p>
    </footer>

</body>

</html>
