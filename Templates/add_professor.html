<!DOCTYPE html>
<html>

<head>
    <title>Add Professor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="navbar">
        <a href="/">Home</a>
        <a href="/departments">Departments</a>
        <a href="/students">Students</a>
        <a href="/professors">Professors</a>
        <a href="/subjects">Subjects</a>
        <a href="/enrollments">Enrollments</a>
    </div>

    <h1>Add Professor</h1>

    <form action="/add_professor" method="POST">

        <label>Professor ID:</label>
        <input type="text" name="prof_id" required>

        <br><br>

        <label>Name:</label>
        <input type="text" name="prof_name" required>

        <br><br>

        <label>Designation:</label>
        <input type="text" name="designation" required>

        <br><br>

        <label>Phone:</label>
        <input type="text" name="phone" required>

        <br><br>

        <label>Email:</label>
        <input type="email" name="email" required>

        <br><br>

        <label>Department:</label>

        <select name="dept_id">

            <option value="CSE">CSE</option>
            <option value="ISE">ISE</option>
            <option value="ECE">ECE</option>
            <option value="ME">ME</option>
            <option value="CE">CE</option>

        </select>

        <br><br>

        <input type="submit" value="Add Professor">

    </form>

    <footer>
        <hr>
        <p>
            Student Course Registration System |
            DBMS Mini Project |
            BIT Bangalore
        </p>
    </footer>

</body>

</html>
